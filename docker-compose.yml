version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ayushman21/plagiarism-backend:latest
    container_name: plagiarism-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/plagiarism.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ayushman21/plagiarism-frontend:latest
    container_name: plagiarism-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
